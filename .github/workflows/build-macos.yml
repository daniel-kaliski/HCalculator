name: Build macOS App
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-mac:
    name: Kompilacja na macOS
    runs-on: macos-latest

    steps:
    - name: 📥 Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: 🐍 Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: 📦 Instalacja zależności
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller

    - name: ⚙️ Budowanie aplikacji (PyInstaller)
      run: |
        pyinstaller --noconfirm HCalculator.spec

    - name: 🗜️ Pakowanie aplikacji (.app do .zip)
      
      run: |
        cd dist
        zip -r HCalculator-macOS.zip HCalculator.app

    - name: 🚀 Udostępnienie gotowego pliku (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: HCalculator-macOS
        path: dist/HCalculator-macOS.zip
