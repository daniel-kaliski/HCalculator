name: Build HCalculator (Windows x64)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Ucisza ostrzeżenie o Node.js 20

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Windows GUI Dependencies
      run: |
        python -m pip install --upgrade pip
        # Instalujemy wheel oraz pythonnet, które pomagają pywebview na maszynach Windows Server
        pip install wheel pythonnet
        pip install pywebview pyinstaller

    - name: Build Windows Executable
      run: |
        pyinstaller --windowed --onefile HCalculator.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HCalculator-Windows-x64
        path: dist/hcalculator.exe
