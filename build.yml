name: Build HCalculator (Windows x64)

on:
  push:
    branches: [ main, master ]  # Uruchom po pushu do gałęzi głównej
    tags:
      - 'v*'                    # Uruchom przy stworzeniu taga wersji np. v1.0.1
  workflow_dispatch:            # Umożliwia ręczne odpalenie budowania w panelu GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywebview pyinstaller

    - name: Build Windows Executable
      run: |
        pyinstaller --windowed --onefile --icon=icon.ico hcalculator.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HCalculator-Windows-x64
        path: dist/hcalculator.exe
